<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-6">
            <div class="weather-logo"></div>
        </div>
    </div>

    <h2 class="text-center mb-5">Sign Up</h2>

    {{if .Error}}
    <div class="row justify-content-center">
        <div class="col-12 col-lg-4 col-md-6 col-sm-12">
            <div class="alert alert-danger" role="alert">
                {{.Error}}
            </div>
        </div>
    </div>
    {{end}}

    <div class="row justify-content-center">
        <div class="col-12 col-lg-4 col-md-6 col-sm-12">
            <form action="/auth/register" method="post" class="mt-4">
                <div class="mb-3">
                    <label for="login" class="form-label">Username</label>
                    <input type="text" class="form-control" id="login" name="login" required value="{{.Login}}"/>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required value=""/>
                </div>
                <div class="mb-3">
                    <label for="repeat-password" class="form-label">Repeat password</label>
                    {{if .RepeatPasswordError}}
                    <input type="password" class="form-control is-invalid" id="repeat-password" name="repeat_password" required value=""/>
                    <div class="invalid-feedback">
                        {{.RepeatPasswordError}}
                    </div>
                    {{else}}
                    <input type="password" class="form-control" id="repeat-password" name="repeat_password" required value=""/>
                    {{end}}
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-3">Sign Up</button>
                <p class="mt-2 text-center">Already have an account? <a href="/sign-in">Sign in here</a></p>
            </form>
        </div>
    </div>
</div>

</body>
</html>
